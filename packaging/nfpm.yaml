name: apt-cacher-ultra
arch: amd64
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: Sean Reifschneider <jafo00@gmail.com>
description: |
  A robust apt repository cache focused on availability under upstream
  failure. Designed as a replacement for apt-cacher-ng that keeps cache
  hits fast and successful even when upstream mirrors are unreachable.
homepage: https://github.com/linsomniac/apt-cacher-ultra
license: MIT
depends:
  - adduser
contents:
  - src: ./build/apt-cacher-ultra
    dst: /usr/sbin/apt-cacher-ultra
    file_info:
      mode: 0755
      owner: root
      group: root
  # Explicit directory entry. nfpm creates parent directories
  # implicitly with a default mode that isn't part of the locked
  # package contract; pinning this to 0755 root:root prevents a
  # writable /etc/apt-cacher-ultra from sneaking in, which would
  # let a local non-root user swap config.toml even though the
  # file itself is 0644 root:root.
  - dst: /etc/apt-cacher-ultra
    type: dir
    file_info:
      mode: 0755
      owner: root
      group: root
  - src: ./packaging/systemd/apt-cacher-ultra.service
    dst: /lib/systemd/system/apt-cacher-ultra.service
    # 0644 is the Debian convention for /lib/systemd/system; nfpm
    # otherwise inherits 0664 from the source tree (umask 002).
    file_info:
      mode: 0644
      owner: root
      group: root
  - src: ./packaging/config/config.toml.default
    dst: /etc/apt-cacher-ultra/config.toml
    type: config|noreplace
    file_info:
      mode: 0644
      owner: root
      group: root
scripts:
  preinstall:  ./packaging/scripts/preinstall.sh
  postinstall: ./packaging/scripts/postinstall.sh
  preremove:   ./packaging/scripts/preremove.sh
  postremove:  ./packaging/scripts/postremove.sh
