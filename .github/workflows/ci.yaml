name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Default to read-only token; jobs that need more should opt in explicitly.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./...
      - run: go test -race -timeout 10m ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          # Pin so CI is reproducible; bump deliberately rather than letting
          # `latest` drift behind your back.
          version: v1.62.2
