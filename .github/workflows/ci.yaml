name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Default to read-only token; jobs that need more should opt in explicitly.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./...
      - run: go test -race -timeout 10m ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          # Pin so CI is reproducible; bump deliberately rather than letting
          # `latest` drift behind your back. v2.x is required for Go 1.25
          # targets (v1.x was built with go1.23/1.24).
          version: v2.12.2

  # SPEC §12.4 docker-compose end-to-end test. Slower lane (~2 min for
  # the docker build + apt-get update inside ubuntu:noble), but it's
  # the only thing that exercises real apt against the cache. ubuntu
  # GitHub runners ship with docker + docker compose preinstalled.
  e2e:
    runs-on: ubuntu-latest
    # Cap the job so a docker hang or apt-get retry storm does not
    # consume the full Actions per-job limit. Local runs complete in
    # ~30s; 10 min gives generous headroom for cold caches.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - run: bash e2e/run.sh

  # SPEC §14 step 3 .deb package install validation. For each
  # supported Ubuntu LTS target, a docker harness builds the .deb,
  # installs it on the target image, validates the package contract
  # (file layout, user, perms, unit syntax) and starts the daemon
  # under the packaged user. This is the gating check that the
  # release artifact actually works on supported targets.
  deb-test:
    runs-on: ubuntu-latest
    # Each target build is ~1-2 min cold; two targets + matrix
    # overhead fits comfortably in 15 min.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - run: bash e2e/deb/run.sh
